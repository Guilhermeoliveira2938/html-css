<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>teste de formulario</h1>

    <form action="cadastro.php" method="post">
        <p>
            <label for="iusu">Usuário: </label>
            <input type="text" name="usu" id="iusu" required minlength="3" maxlength="20" size="15" placeholder="Nome do Usuário">
        </p>

        <p>
            <div>
                <label for="isen">Senha: </label>
                <input type="password" name="sen" id="isen" required minlength="6" maxlength="15" placeholder="Minimo de 6 digitos">
            </div>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
